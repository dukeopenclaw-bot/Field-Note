<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0b0c10"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Field Note"/>
<title>Field Note</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0b0c10;--surface:#13151c;--surface2:#1a1d28;--surface3:#222636;
  --border:#2a2f42;--amber:#f59e0b;--amber-dim:#92600a;--amber-glow:#f59e0b44;
  --red:#ef4444;--green:#22c55e;--text:#e8e6e0;--text-dim:#8b8fa8;--text-muted:#4a4e63;
  --font-head:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif;
  --font-mono:'JetBrains Mono',monospace;--radius:10px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font-body);color:var(--text);-webkit-font-smoothing:antialiased;padding-top:var(--safe-top)}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;background:var(--bg);overflow:hidden}

/* ── HEADER ── */
.statusbar{height:4px;background:linear-gradient(90deg,var(--amber) 0%,#f97316 50%,var(--amber) 100%);background-size:200% 100%;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--amber);border-radius:8px;display:grid;place-items:center;font-size:18px}
.logo-text{font-family:var(--font-head);font-size:24px;font-weight:900;letter-spacing:2px;color:var(--text)}
.logo-text span{color:var(--amber)}
.header-right{display:flex;align-items:center;gap:10px}
.sync-pill{font-family:var(--font-mono);font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--text-muted);display:flex;align-items:center;gap:5px;transition:color .3s,border-color .3s}
.sync-pill.live{color:var(--green);border-color:var(--green)}
.sync-pill.cached{color:var(--amber);border-color:var(--amber-dim)}
.sync-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.icon-btn{width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:grid;place-items:center;cursor:pointer;font-size:16px;color:var(--text-dim)}

/* ── TABS ── */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:13px 0;font-family:var(--font-head);font-size:15px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);background:none;border:none;cursor:pointer;position:relative;transition:color .2s}
.tab.active{color:var(--amber)}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--amber);border-radius:2px 2px 0 0}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 calc(20px + var(--safe-bot));-webkit-overflow-scrolling:touch}
.screen{display:none}
.screen.active{display:block}
.section-head{padding:20px 18px 10px;font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:3px;color:var(--amber);text-transform:uppercase}

/* ── FORM CARD ── */
/* overflow:visible 필수 — 자동완성 드롭다운이 카드 밖으로 나와야 함 */
.form-card{
  margin:0 14px 12px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:visible;   /* ★ hidden 아님 */
}
.field-row{display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);min-height:54px;position:relative}
.field-row:first-child{border-radius:var(--radius) var(--radius) 0 0}
.field-row:last-child{border-bottom:none;border-radius:0 0 var(--radius) var(--radius)}
.field-label{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;width:100px;flex-shrink:0}
.field-input{flex:1;background:none;border:none;outline:none;font-family:var(--font-body);font-size:15px;color:var(--text);padding:16px 0;width:100%}
.field-input::placeholder{color:var(--text-muted)}
select.field-input{-webkit-appearance:none;appearance:none;cursor:pointer}

/* ── AUTOCOMPLETE ── */
.ac-wrap{position:relative;flex:1;display:flex;align-items:center}
.ac-wrap .field-input{width:100%}

/* 드롭다운은 fixed로 JS에서 위치 계산 */
#tag-drop{
  position:fixed;
  background:var(--surface2);
  border:1px solid var(--amber-dim);
  border-radius:8px;
  z-index:99000;
  max-height:240px;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
  display:none;
}
.ac-item{
  padding:12px 16px;cursor:pointer;
  border-bottom:1px solid var(--border);
  transition:background .12s;
}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.active{background:var(--surface3)}
.ac-tag{font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--text);letter-spacing:1px}
.ac-tag em{color:var(--amber);font-style:normal}
.ac-meta{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:2px}
.ac-loc{color:var(--amber-dim)}

/* ── COMMENTS ── */
.comment-grid{margin:0 14px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:480px){.comment-grid{grid-template-columns:1fr}}
.comment-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.comment-box-label{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--amber);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.auto-badge{font-size:9px;background:var(--amber-glow);color:var(--amber);padding:2px 6px;border-radius:10px;border:1px solid var(--amber-dim)}
.comment-textarea{width:100%;min-height:80px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font-body);font-size:14px;padding:10px 12px;resize:vertical;outline:none;transition:border-color .2s}
.comment-textarea:focus{border-color:var(--amber)}

/* ── PHOTOS ── */
.photo-section{margin:0 14px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.photo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
@media(max-width:400px){.photo-grid{grid-template-columns:repeat(4,1fr)}}
.photo-thumb{aspect-ratio:1;background:var(--surface2);border:1px dashed var(--border);border-radius:6px;overflow:hidden;position:relative;cursor:pointer;transition:transform .1s}
.photo-thumb:active{transform:scale(0.95)}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.photo-del{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(0,0,0,.75);border-radius:50%;display:grid;place-items:center;font-size:10px;color:#fff;cursor:pointer;border:none}
.photo-add-btn{aspect-ratio:1;background:var(--surface2);border:1px dashed var(--border);border-radius:6px;display:grid;place-items:center;cursor:pointer;transition:border-color .2s,background .2s;color:var(--text-muted);font-size:22px}
.photo-add-btn:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-glow)}
#fileInput{display:none}

/* ── SUBMIT ── */
.submit-wrap{margin:8px 14px 0}
.btn-submit{width:100%;padding:17px;background:var(--amber);color:#0b0c10;border:none;border-radius:var(--radius);font-family:var(--font-head);font-size:18px;font-weight:900;letter-spacing:3px;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:transform .1s,box-shadow .2s}
.btn-submit:hover{box-shadow:0 0 30px var(--amber-glow)}
.btn-submit:active{transform:scale(0.98)}
.btn-submit:disabled{background:var(--surface3);color:var(--text-muted);cursor:not-allowed}
.progress-bar{position:absolute;left:0;top:0;height:100%;background:rgba(0,0,0,.2);transition:width .3s}

/* ── SEARCH ── */
.search-filters{margin:14px 14px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.filter-row{display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--border);min-height:48px}
.filter-row:last-child{border-bottom:none}
.filter-label{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;width:90px;flex-shrink:0}
.filter-input{flex:1;background:none;border:none;outline:none;font-size:14px;color:var(--text);font-family:var(--font-body);padding:12px 0}
.filter-input::placeholder{color:var(--text-muted)}
.date-range{display:flex;align-items:center;gap:8px;flex:1}
.date-range input{flex:1;background:none;border:none;outline:none;font-size:13px;color:var(--text);font-family:var(--font-mono);color-scheme:dark}
.search-actions{display:flex;gap:8px;margin:10px 14px}
.btn-search{flex:1;padding:14px;background:var(--amber);color:#0b0c10;border:none;border-radius:var(--radius);font-family:var(--font-head);font-size:16px;font-weight:900;letter-spacing:2px;cursor:pointer;transition:box-shadow .2s}
.btn-search:hover{box-shadow:0 0 20px var(--amber-glow)}
.btn-reset{padding:14px 18px;background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-head);font-size:14px;font-weight:700;cursor:pointer}
.result-stats{padding:10px 18px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:8px}
.result-count{background:var(--surface3);color:var(--amber);padding:2px 10px;border-radius:20px;font-size:12px}

/* ── RECORD CARDS ── */
.records-list{padding:0 14px}
.record-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color .2s;cursor:pointer}
.record-card:hover{border-color:var(--amber-dim)}
.record-head{padding:14px 16px 10px;display:flex;align-items:flex-start;gap:12px}
.record-no{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);background:var(--surface3);border:1px solid var(--border);padding:3px 8px;border-radius:6px;flex-shrink:0;margin-top:2px}
.record-main{flex:1;min-width:0}
.record-tag{font-family:var(--font-head);font-size:18px;font-weight:900;color:var(--text);letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.meta-chip{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);background:var(--surface3);border:1px solid var(--border);padding:2px 8px;border-radius:4px}
.type-chip{background:var(--amber-glow);color:var(--amber);border-color:var(--amber-dim)}
.record-comment{padding:0 16px 14px;font-size:13px;color:var(--text-dim);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.record-photos{padding:0 16px 14px;display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.record-photo{width:64px;height:64px;flex-shrink:0;border-radius:6px;object-fit:cover;border:1px solid var(--border);cursor:pointer}
.record-arrow{font-size:14px;color:var(--text-muted);transition:transform .2s;flex-shrink:0;margin-top:2px}
.record-card.expanded .record-arrow{transform:rotate(180deg)}
.record-detail{display:none;padding:0 16px 16px;border-top:1px solid var(--border);margin-top:4px}
.record-card.expanded .record-detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
@media(max-width:400px){.detail-grid{grid-template-columns:1fr}}
.detail-item-label{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:3px}
.detail-item-value{font-size:14px;color:var(--text);font-family:var(--font-mono);word-break:break-all}
.detail-comment-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.detail-comment-lang{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--amber);text-transform:uppercase;margin-bottom:6px}
.detail-comment-text{font-size:14px;color:var(--text);line-height:1.6}
.detail-photos-full{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
@media(max-width:400px){.detail-photos-full{grid-template-columns:repeat(3,1fr)}}
.detail-photo{aspect-ratio:1;border-radius:6px;object-fit:cover;border:1px solid var(--border);width:100%;cursor:pointer;transition:transform .15s}
.detail-photo:hover{transform:scale(1.03)}

/* ── TOAST / LIGHTBOX ── */
#toast{position:fixed;bottom:calc(20px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-family:var(--font-body);font-size:14px;color:var(--text);box-shadow:0 4px 30px rgba(0,0,0,.6);z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--green);color:var(--green)}
#toast.error{border-color:var(--red);color:var(--red)}
#toast.warning{border-color:var(--amber);color:var(--amber)}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:99999;display:none;place-items:center;cursor:pointer}
#lightbox.show{display:grid}
#lightbox img{max-width:95vw;max-height:95vh;border-radius:6px;object-fit:contain}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{padding:40px;text-align:center;color:var(--text-muted);font-family:var(--font-head);font-size:14px;letter-spacing:2px}
.empty-state{padding:60px 30px;text-align:center;color:var(--text-muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-family:var(--font-head);font-size:15px;font-weight:700;letter-spacing:2px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <div class="statusbar"></div>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">📋</div>
      <div class="logo-text">FIELD<span>NOTE</span></div>
    </div>
    <div class="header-right">
      <div class="sync-pill" id="sync-pill"><span class="sync-dot"></span><span id="sync-label">—</span></div>
      <button class="icon-btn" onclick="refreshData(true)" title="강제 동기화">🔄</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-register" onclick="showTab('register')">✚ 등록</button>
    <button class="tab"        id="tab-search"   onclick="showTab('search')"  >🔍 검색</button>
  </div>

  <div class="content">

    <!-- ══ REGISTER ══ -->
    <div class="screen active" id="screen-register">
      <div class="section-head">📌 NEW FIELD NOTE &nbsp;<button onclick="debugEquipment()" style="font-size:9px;background:var(--surface3);color:var(--text-muted);border:1px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;font-family:var(--font-mono);letter-spacing:0;vertical-align:middle">🔧 EQ진단</button></div>
      <div class="form-card">

        <!-- EQ TAG — 자동완성 분리 -->
        <div class="field-row">
          <div class="field-label">EQ. TAG</div>
          <div class="ac-wrap">
            <input class="field-input" id="reg-tag" type="text"
              placeholder="입력하면 목록 표시"
              autocomplete="off" autocapitalize="characters"
              oninput="onTagInput()" onkeydown="onTagKeydown(event)" onfocus="onTagInput()"/>
          </div>
        </div>

        <div class="field-row">
          <div class="field-label">NAME</div>
          <input class="field-input" id="reg-name" type="text" placeholder="등록자 이름" autocomplete="off"/>
        </div>
        <div class="field-row">
          <div class="field-label">LOCATION</div>
          <input class="field-input" id="reg-location" type="text" placeholder="자동 입력 또는 직접 입력" autocomplete="off" readonly/>
        </div>
        <div class="field-row">
          <div class="field-label">DRAWING</div>
          <input class="field-input" id="reg-drawing" type="text" placeholder="P&amp;ID-1001-A" autocomplete="off"/>
        </div>
        <div class="field-row">
          <div class="field-label">TYPE</div>
          <select class="field-input" id="reg-type">
            <option value="">-- Select Type --</option>
            <option>Mechanical</option><option>Electrical</option>
            <option>Instrument</option><option>Piping</option>
            <option>Civil</option><option>Safety</option>
            <option>Process</option><option>Other</option>
          </select>
        </div>
      </div>

      <div class="section-head">💬 COMMENT</div>
      <div class="comment-grid">
        <div class="comment-box">
          <div class="comment-box-label">🇰🇷 한국어 <span class="auto-badge">AUTO</span></div>
          <textarea class="comment-textarea" id="reg-comment-ko" placeholder="한국어로 입력&#10;(영어만 써도 자동번역)"></textarea>
        </div>
        <div class="comment-box">
          <div class="comment-box-label">🇺🇸 English <span class="auto-badge">AUTO</span></div>
          <textarea class="comment-textarea" id="reg-comment-en" placeholder="Describe in English&#10;(Auto-translated from Korean)"></textarea>
        </div>
      </div>

      <div class="section-head">📷 PHOTOS <span id="photo-count-head" style="color:var(--text-muted);font-weight:400">(0/20)</span></div>
      <div class="photo-section">
        <div class="photo-grid" id="photo-grid">
          <div class="photo-add-btn" onclick="triggerFileInput()">＋</div>
        </div>
        <input type="file" id="fileInput" accept="image/*" multiple onchange="handlePhotos(event)"/>
      </div>

      <div class="submit-wrap">
        <button class="btn-submit" id="btn-submit" onclick="submitRecord()">
          <div class="progress-bar" id="submit-progress" style="width:0%"></div>
          <span id="submit-label">⬆ SUBMIT FIELD NOTE</span>
        </button>
      </div>
    </div>

    <!-- ══ SEARCH ══ -->
    <div class="screen" id="screen-search">
      <div class="search-filters">
        <div class="filter-row">
          <div class="filter-label">EQ. TAG</div>
          <input class="filter-input" id="s-tag" type="text" placeholder="P-101..." autocomplete="off"/>
        </div>
        <div class="filter-row">
          <div class="filter-label">LOCATION</div>
          <input class="filter-input" id="s-location" type="text" placeholder="Unit-A..." autocomplete="off"/>
        </div>
        <div class="filter-row">
          <div class="filter-label">DRAWING</div>
          <input class="filter-input" id="s-drawing" type="text" placeholder="P&amp;ID..." autocomplete="off"/>
        </div>
        <div class="filter-row">
          <div class="filter-label">TYPE</div>
          <select class="filter-input" id="s-type">
            <option value="">All Types</option>
            <option>Mechanical</option><option>Electrical</option>
            <option>Instrument</option><option>Piping</option>
            <option>Civil</option><option>Safety</option>
            <option>Process</option><option>Other</option>
          </select>
        </div>
        <div class="filter-row">
          <div class="filter-label">KEYWORD</div>
          <input class="filter-input" id="s-keyword" type="text" placeholder="키워드 / keyword..." autocomplete="off"/>
        </div>
        <div class="filter-row">
          <div class="filter-label">DATE</div>
          <div class="date-range">
            <input type="date" id="s-date-from"/>
            <span style="color:var(--text-muted)">—</span>
            <input type="date" id="s-date-to"/>
          </div>
        </div>
      </div>
      <div class="search-actions">
        <button class="btn-search" onclick="doSearch()">🔍 SEARCH</button>
        <button class="btn-reset" onclick="resetSearch()">✕ RESET</button>
      </div>
      <div class="result-stats" id="result-stats" style="display:none">
        <span>Results</span>
        <span class="result-count" id="result-count">0</span>
      </div>
      <div class="records-list" id="records-list">
        <div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">검색 조건을 입력하세요</div></div>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /app -->

<div id="tag-drop"></div>

<div id="toast"></div>
<div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src="" alt=""/></div>

<script>
// ═══════════════════════════════════════════════════════════
//  ★ GAS URL ★
// ═══════════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyJaSYBRwEx24s7B10iH6oFvmz_kkrrfGoPYjc4ibgSy9O_A1ugnmZviAUtA5-RSaSDog/exec';

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let photos        = [];
let cachedRecords = [];
let equipmentList = [];   // [{tag, fmodu, location}]
let acMatches     = [];
let acIndex       = -1;
let isFetching    = false;

// ═══════════════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════════════
function showTab(name) {
  ['register','search'].forEach(t => {
    document.getElementById('screen-' + t).classList.toggle('active', t === name);
    document.getElementById('tab-'    + t).classList.toggle('active', t === name);
  });

// ═══════════════════════════════════════════════════════════
//  SYNC PILL
// ═══════════════════════════════════════════════════════════
function setSyncStatus(state, label) {

// ═══════════════════════════════════════════════════════════
//  EQUIPMENT AUTOCOMPLETE
// ═══════════════════════════════════════════════════════════
async function loadEquipment() {
  try {
    const cached = localStorage.getItem('fn_equip_cache');
    if (cached) {
      equipmentList = JSON.parse(cached);
    }
    const data = await gasGet({ action: 'getEquipment' });
    if (data.success && data.equipment && data.equipment.length) {
      equipmentList = data.equipment;
      localStorage.setItem('fn_equip_cache', JSON.stringify(equipmentList));
    } else if (!data.success) {
      toast('EQ 로드 실패: ' + (data.error||'unknown'), 'error');
    }
  } catch(e) {
    const cached = localStorage.getItem('fn_equip_cache');
    if (cached) equipmentList = JSON.parse(cached);
  }
}

// 진단 함수 — 앱 내 버튼으로 호출
async function debugEquipment() {
  toast('EQ 진단 중...', '');
  try {
    const data = await gasGet({ action: 'getEquipment' });
    if (!data.success) {
      toast('❌ GAS오류: ' + (data.error||'unknown'), 'error'); return;
    }
    const list = data.equipment || [];
    if (!list.length) {
      toast('❌ Equipment 시트 데이터 없음 (헤더 확인)', 'error'); return;
    }
    equipmentList = list;
    localStorage.setItem('fn_equip_cache', JSON.stringify(list));
    toast(`✅ EQ ${list.length}건 로드 완료 — 첫번째: ${list[0].tag}`, 'success');
  } catch(e) {
    toast('❌ 연결오류: ' + e.message, 'error');
  }
}

function onTagInput() {
  const q = (document.getElementById('reg-tag').value || '').trim().toLowerCase();
  if (!q || equipmentList.length === 0) { closeDropdown(); return; }

  acMatches = equipmentList
    .filter(e => e.tag.toLowerCase().includes(q))
    .slice(0, 12);

  if (!acMatches.length) { closeDropdown(); return; }

  acIndex = -1;
  renderDropdown(q);
  positionDropdown();
}

function renderDropdown(q) {
  const drop = document.getElementById('tag-drop');
  const esc  = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  drop.innerHTML = acMatches.map((e, i) => {
    const hi = e.tag.replace(new RegExp(`(${esc})`, 'gi'), '<em>$1</em>');
    const meta = [e.fmodu, e.location].filter(Boolean).join(' · ');
    return `<div class="ac-item" data-i="${i}"
      onmousedown="selectEquip(${i})"
      ontouchstart="selectEquip(${i})">
      <div class="ac-tag">${hi}</div>
      ${meta ? `<div class="ac-meta"><span class="ac-loc">${meta}</span></div>` : ''}
    </div>`;
  }).join('');
  drop.style.display = 'block';
}

// fixed 위치 계산 — 키보드 올라와도 정확하게
function positionDropdown() {
  const input = document.getElementById('reg-tag');
  const drop  = document.getElementById('tag-drop');
  const rect  = input.getBoundingClientRect();

  // 화면 하단에 공간이 부족하면 위쪽에 표시
  const spaceBelow = window.innerHeight - rect.bottom;
  const dropH      = Math.min(240, acMatches.length * 56);

  if (spaceBelow < dropH && rect.top > dropH) {
    // 위쪽 표시
    drop.style.top    = (rect.top - dropH - 4) + 'px';
  } else {
    // 아래쪽 표시
    drop.style.top    = (rect.bottom + 4) + 'px';
  }
  drop.style.left  = rect.left  + 'px';
  drop.style.width = rect.width + 'px';
}

function closeDropdown() {
  const drop = document.getElementById('tag-drop');
  drop.style.display = 'none';
  acMatches = [];
  acIndex   = -1;
}

let _selecting = false;
function selectEquip(i) {
  if (_selecting) return;
  _selecting = true;
  setTimeout(() => _selecting = false, 300);

  const eq = acMatches[i];
  if (!eq) return;
  document.getElementById('reg-tag').value      = eq.tag;
  document.getElementById('reg-location').value = eq.location || '';
  closeDropdown();
  document.getElementById('reg-drawing').focus();
}

function onTagKeydown(e) {
  const drop  = document.getElementById('tag-drop');
  if (drop.style.display === 'none') return;
  const items = drop.querySelectorAll('.ac-item');
  if (!items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acIndex = Math.min(acIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
    items[acIndex]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acIndex = Math.max(acIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
    items[acIndex]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter' && acIndex >= 0) {
    e.preventDefault();
    selectEquip(acIndex);
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
}

// 외부 클릭 시 드롭다운 닫기
document.addEventListener('click', e => {
  if (!e.target.closest('#reg-tag') && !e.target.closest('#tag-drop'))
    closeDropdown();
});

// 스크롤 / 리사이즈 시 위치 재계산
window.addEventListener('scroll', () => {
  if (document.getElementById('tag-drop').style.display !== 'none') positionDropdown();
}, true);
window.addEventListener('resize', () => {
  if (document.getElementById('tag-drop').style.display !== 'none') positionDropdown();
});

// ═══════════════════════════════════════════════════════════
//  PHOTO HANDLING
// ═══════════════════════════════════════════════════════════

// 폼 상태를 sessionStorage에 저장 (카메라 앱 복귀 시 복원용)
function saveFormState() {
  const state = {
    tag:      document.getElementById('reg-tag').value,
    name:     document.getElementById('reg-name').value,
    location: document.getElementById('reg-location').value,
    drawing:  document.getElementById('reg-drawing').value,
    type:     document.getElementById('reg-type').value,
    ko:       document.getElementById('reg-comment-ko').value,
    en:       document.getElementById('reg-comment-en').value,
    // 사진은 base64 compressed만 저장 (dataUrl은 blob이라 복원 불가)
    photos:   photos.map(p => ({ compressed: p.compressed }))
  };
  sessionStorage.setItem('fn_form_draft', JSON.stringify(state));
}

async function restoreFormState() {
  const raw = sessionStorage.getItem('fn_form_draft');
  if (!raw) return false;
  try {
    const s = JSON.parse(raw);
    document.getElementById('reg-tag').value      = s.tag      || '';
    document.getElementById('reg-name').value     = s.name     || '';
    document.getElementById('reg-location').value = s.location || '';
    document.getElementById('reg-drawing').value  = s.drawing  || '';
    document.getElementById('reg-type').value     = s.type     || '';
    document.getElementById('reg-comment-ko').value = s.ko     || '';
    document.getElementById('reg-comment-en').value = s.en     || '';

    // 사진 복원 — base64 → blob URL
    if (s.photos && s.photos.length) {
      photos = [];
      for (const p of s.photos) {
        const blob    = b64toBlob(p.compressed, 'image/jpeg');
        const dataUrl = URL.createObjectURL(blob);
        photos.push({ dataUrl, compressed: p.compressed });
      }
      renderPhotoGrid();
      toast(`📷 사진 ${photos.length}장 복원됨`, 'success');
    }
    return true;
  } catch(e) {
    return false;
  }
}

function clearFormDraft() {
  sessionStorage.removeItem('fn_form_draft');
}

function b64toBlob(b64, mimeType) {
  const bytes = atob(b64);
  const arr   = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mimeType });
}

function triggerFileInput() {
  if (photos.length >= 20) { toast('최대 20장까지 등록 가능합니다', 'warning'); return; }
  saveFormState();   // ★ 카메라 열기 전에 현재 상태 저장
  document.getElementById('fileInput').click();
}

async function handlePhotos(e) {
  const files     = Array.from(e.target.files);
  const remaining = 20 - photos.length;
  const toAdd     = files.slice(0, remaining);
  if (files.length > remaining)
    toast(`${files.length - remaining}장 초과 — ${remaining}장만 추가됩니다`, 'warning');
  for (const file of toAdd) {
    const compressed = await compressImage(file, 1200, 0.82);
    const dataUrl    = URL.createObjectURL(file);
    photos.push({ dataUrl, compressed });
  }
  renderPhotoGrid();
  saveFormState();   // ★ 사진 추가 후 즉시 상태 저장
  e.target.value = '';
}
function removePhoto(idx) {
  URL.revokeObjectURL(photos[idx].dataUrl);
  photos.splice(idx, 1);
  renderPhotoGrid();
}
function renderPhotoGrid() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = '';
  photos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'photo-thumb';
    div.innerHTML = `<img src="${p.dataUrl}"/><button class="photo-del" onclick="removePhoto(${i})">✕</button>`;
    grid.appendChild(div);
  });
  if (photos.length < 20) {
    const btn = document.createElement('div');
    btn.className = 'photo-add-btn';
    btn.textContent = '＋';
    btn.onclick = triggerFileInput;
    grid.appendChild(btn);
  }
  document.getElementById('photo-count-head').textContent = `(${photos.length}/20)`;
}
function compressImage(file, maxDim, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else       { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality).split(',')[1]);
    };
    img.src = URL.createObjectURL(file);
  });
}

// ═══════════════════════════════════════════════════════════
//  PHOTO URL 보정 (구형 uc?export=view → thumbnail)
// ═══════════════════════════════════════════════════════════
function fixPhotoUrl(url) {
  if (!url) return url;
  const m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m && url.includes('uc?export=view'))
    return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w1200`;
  return url;
}

// ═══════════════════════════════════════════════════════════
//  API HELPERS
// ═══════════════════════════════════════════════════════════
async function gasPost(payload) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  });
  return JSON.parse(await res.text());
}
async function gasGet(params = {}) {
  const qs  = new URLSearchParams(params).toString();
  const res = await fetch(`${GAS_URL}?${qs}`);
  return JSON.parse(await res.text());
}

// ═══════════════════════════════════════════════════════════
//  SUBMIT RECORD
// ═══════════════════════════════════════════════════════════
async function submitRecord() {
  const tag      = document.getElementById('reg-tag').value.trim();
  const name     = document.getElementById('reg-name').value.trim();
  const location = document.getElementById('reg-location').value.trim();
  const drawing  = document.getElementById('reg-drawing').value.trim();
  const type     = document.getElementById('reg-type').value;
  const ko       = document.getElementById('reg-comment-ko').value.trim();
  const en       = document.getElementById('reg-comment-en').value.trim();

  if (!tag)       { toast('Equipment Tag를 입력하세요', 'error');  return; }
  if (!name)      { toast('등록자 이름을 입력하세요',   'error');  return; }
  if (!ko && !en) { toast('Comment를 최소 한 언어로 입력하세요', 'error'); return; }

  const btn = document.getElementById('btn-submit');
  const lbl = document.getElementById('submit-label');
  const bar = document.getElementById('submit-progress');
  btn.disabled = true;

  const dateStr    = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const totalSteps = photos.length + 1;
  let step = 0;
  const setProgress = msg => {
    bar.style.width = Math.round(++step / totalSteps * 100) + '%';
    lbl.textContent = msg;
  };

  try {
    const photoUrls = [];
    for (let i = 0; i < photos.length; i++) {
      setProgress(`📤 사진 업로드 중... (${i+1}/${photos.length})`);
      const r = await gasPost({
        action:'uploadPhoto', base64:photos[i].compressed,
        mimeType:'image/jpeg',
        filename:`${dateStr}_${tag}_${String(i+1).padStart(2,'0')}`
      });
      if (!r.success) throw new Error(r.error || 'Photo upload failed');
      photoUrls.push(r.url);
    }

    setProgress('💾 데이터 저장 중...');
    const r = await gasPost({
      action:'saveRecord',
      equipmentTag:tag, name, location, drawingNo:drawing,
      type, commentKo:ko, commentEn:en, photoUrls
    });
    if (!r.success) throw new Error(r.error || 'Save failed');

    bar.style.width = '100%';
    lbl.textContent = '✓ 등록 완료!';
    toast(`Field Note #${r.no} 등록 완료 ✓`, 'success');

    setTimeout(() => {
      resetForm();
      btn.disabled    = false;
      bar.style.width = '0%';
      lbl.textContent = '⬆ SUBMIT FIELD NOTE';
      localStorage.removeItem('fn_cache_meta');
      localStorage.removeItem('fn_cache_records');
      refreshData(true);
    }, 1500);

  } catch(err) {
    toast('오류: ' + err.message, 'error');
    btn.disabled    = false;
    bar.style.width = '0%';
    lbl.textContent = '⬆ SUBMIT FIELD NOTE';
  }
}

function resetForm() {
  ['reg-tag','reg-name','reg-location','reg-drawing','reg-comment-ko','reg-comment-en']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('reg-type').value = '';
  photos.forEach(p => URL.revokeObjectURL(p.dataUrl));
  photos = [];
  renderPhotoGrid();
  clearFormDraft();  // ★ 제출 후 draft 삭제
}

// ═══════════════════════════════════════════════════════════
//  DATA SYNC
// ═══════════════════════════════════════════════════════════
async function refreshData(force = false) {
  if (isFetching) return;
  isFetching = true;
  setSyncStatus('', '동기화 중...');
  try {
    const meta   = await gasGet({ action: 'metadata' });
    if (!meta.success) throw new Error(meta.error);
    const stored = JSON.parse(localStorage.getItem('fn_cache_meta') || 'null');
    const isStale = !stored || stored.rowCount !== meta.rowCount || stored.modified !== meta.modified;

    if (!force && !isStale) {
      cachedRecords = JSON.parse(localStorage.getItem('fn_cache_records') || '[]');
      setSyncStatus('cached', `CACHED · ${cachedRecords.length}건`);
    } else {
      const data = await gasGet({ action: 'getAll' });
      if (!data.success) throw new Error(data.error);
      cachedRecords = data.records;
      localStorage.setItem('fn_cache_records', JSON.stringify(cachedRecords));
      localStorage.setItem('fn_cache_meta',    JSON.stringify(meta));
      setSyncStatus('live', `LIVE · ${cachedRecords.length}건`);
    }
  } catch(err) {
    const cached = JSON.parse(localStorage.getItem('fn_cache_records') || '[]');
    cachedRecords = cached;
    setSyncStatus('cached', `OFFLINE · ${cached.length}건`);
    if (!cached.length) toast('연결 실패: ' + err.message, 'error');
  } finally {
    isFetching = false;
  }
}

// ═══════════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════════
async function doSearch() {
  if (!cachedRecords.length) await refreshData();
  const f = {
    tag:      document.getElementById('s-tag').value.trim(),
    location: document.getElementById('s-location').value.trim(),
    drawingNo:document.getElementById('s-drawing').value.trim(),
    type:     document.getElementById('s-type').value,
    keyword:  document.getElementById('s-keyword').value.trim(),
    dateFrom: document.getElementById('s-date-from').value,
    dateTo:   document.getElementById('s-date-to').value
  };
  const results = cachedRecords.filter(r => {
    if (f.tag      && !n(r['Equipment Tag']).includes(n(f.tag)))      return false;
    if (f.location && !n(r['Location'])     .includes(n(f.location))) return false;
    if (f.drawingNo&& !n(r['Drawing No.'])  .includes(n(f.drawingNo)))return false;
    if (f.type     && r['Type'] !== f.type)                           return false;
    if (f.keyword && !n(r['Comment(Korean)']+r['Comment(English)']).includes(n(f.keyword))) return false;
    if (f.dateFrom && r['Date&time'] < f.dateFrom)                    return false;
    if (f.dateTo   && r['Date&time'] > f.dateTo + ' 23:59:59')        return false;
    return true;
  });
  document.getElementById('result-stats').style.display = 'flex';
  document.getElementById('result-count').textContent   = results.length;
  renderResults(results);
}
const n = s => (s||'').toLowerCase().trim();

function resetSearch() {
  ['s-tag','s-location','s-drawing','s-keyword','s-date-from','s-date-to']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('s-type').value = '';
  document.getElementById('result-stats').style.display = 'none';
  document.getElementById('records-list').innerHTML =
    '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">검색 조건을 입력하세요</div></div>';
}

// ═══════════════════════════════════════════════════════════
//  RENDER CARDS
// ═══════════════════════════════════════════════════════════
function renderResults(records) {
  const list = document.getElementById('records-list');
  if (!records.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">검색 결과가 없습니다</div></div>';
    return;
  }
  const sorted = [...records].sort((a,b) => (+b['No.']||0) - (+a['No.']||0));
  list.innerHTML = sorted.map((r,i) => buildCard(r,i)).join('');
}

function buildCard(r, i) {
  const pList  = Array.from({length:20},(_,j)=>r[`Photo${j+1}`]).filter(Boolean).map(fixPhotoUrl);
  const thumbs = pList.slice(0,4).map(u=>`<img class="record-photo" src="${u}" onclick="openLightbox('${u}',event)">`).join('');
  const allPh  = pList.map(u=>`<img class="detail-photo" src="${u}" onclick="openLightbox('${u}',event)">`).join('');
  const ko = r['Comment(Korean)']  || '';
  const en = r['Comment(English)'] || '';
  const fields = [
    {l:'No.',     v:r['No.']         ||'—'},
    {l:'Date',    v:(r['Date&time']||'').slice(0,16)||'—'},
    {l:'Name',    v:r['Name']        ||'—'},
    {l:'Location',v:r['Location']    ||'—'},
    {l:'Drawing', v:r['Drawing No.'] ||'—'},
    {l:'Type',    v:r['Type']        ||'—'},
  ].map(d=>`<div class="detail-item"><div class="detail-item-label">${d.l}</div><div class="detail-item-value">${d.v}</div></div>`).join('');

  return `
  <div class="record-card" id="card-${i}" onclick="toggleCard(${i})">
    <div class="record-head">
      <div class="record-no">#${r['No.']||'?'}</div>
      <div class="record-main">
        <div class="record-tag">${r['Equipment Tag']||'—'}</div>
        <div class="record-meta">
          ${r['Type']       ?`<span class="meta-chip type-chip">⚙ ${r['Type']}</span>`:''}
          ${r['Location']   ?`<span class="meta-chip">📍 ${r['Location']}</span>`:''}
          ${r['Drawing No.']?`<span class="meta-chip">📐 ${r['Drawing No.']}</span>`:''}
          <span class="meta-chip">🕐 ${(r['Date&time']||'').slice(0,10)}</span>
          ${r['Name']       ?`<span class="meta-chip">👤 ${r['Name']}</span>`:''}
          ${pList.length    ?`<span class="meta-chip">📷 ${pList.length}</span>`:''}
        </div>
      </div>
      <div class="record-arrow">▾</div>
    </div>
    ${ko?`<div class="record-comment">${ko}</div>`:''}
    ${thumbs?`<div class="record-photos">${thumbs}</div>`:''}
    <div class="record-detail">
      <div class="detail-grid">${fields}</div>
      ${ko?`<div class="detail-comment-box"><div class="detail-comment-lang">🇰🇷 한국어</div><div class="detail-comment-text">${ko}</div></div>`:''}
      ${en?`<div class="detail-comment-box"><div class="detail-comment-lang">🇺🇸 English</div><div class="detail-comment-text">${en}</div></div>`:''}
      ${allPh?`<div class="detail-photos-full">${allPh}</div>`:''}
    </div>
  </div>`;
}
function toggleCard(i){ document.getElementById('card-'+i)?.classList.toggle('expanded'); }

// ═══════════════════════════════════════════════════════════
//  LIGHTBOX / TOAST / SW
// ═══════════════════════════════════════════════════════════
function openLightbox(url,e){ e?.stopPropagation(); document.getElementById('lightbox-img').src=url; document.getElementById('lightbox').classList.add('show'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('show'); }
let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show '+type;
  clearTimeout(_tt); _tt=setTimeout(()=>el.className='',3200);
}
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
(async function init(){
  cachedRecords = JSON.parse(localStorage.getItem('fn_cache_records')||'[]');
  if(cachedRecords.length) setSyncStatus('cached',`CACHED · ${cachedRecords.length}건`);

  renderPhotoGrid();

  // ★ 카메라에서 복귀 시 폼 상태 복원
  const restored = await restoreFormState();
  if (restored) {
    // draft가 있으면 등록 탭 유지 (이미 active)
  }

  // 폼 필드 변경 시 자동 저장
  ['reg-tag','reg-name','reg-location','reg-drawing','reg-comment-ko','reg-comment-en'].forEach(id => {
    document.getElementById(id).addEventListener('input', saveFormState);
  });
  document.getElementById('reg-type').addEventListener('change', saveFormState);

  // 병렬 로드
  await Promise.all([
    refreshData(false),
    loadEquipment()
  ]);
})();
</script>
